{% extends "base.html" %} {% block content %}
<div class="form-page">
  <div class="form-card glass">
    <h2>➕ Add New Expense</h2>
    <form method="POST" action="{{ url_for('add_expense') }}">
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input
            type="date"
            name="date"
            class="form-control"
            value="{{ today }}"
            required
          />
        </div>
        <div class="form-group">
          <label>Description</label>
          <input
            type="text"
            name="description"
            class="form-control"
            placeholder="e.g. Grocery shopping"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Amount (₹)</label>
          <input
            type="number"
            name="amount"
            class="form-control"
            placeholder="0.00"
            step="0.01"
            required
          />
        </div>
        <div class="form-group">
          <label>Category</label>
          <select name="category" class="form-control">
            {% for v in dropdowns.category %}
            <option>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Payment Method</label>
          <select name="paymentmethod" class="form-control">
            {% for v in dropdowns.paymentmethod %}
            <option>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <select name="location" class="form-control">
            {% for v in dropdowns.location %}
            <option>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Account Type</label>
          <select name="accounttype" class="form-control">
            {% for v in dropdowns.accounttype %}
            <option>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Device Used</label>
          <select name="deviceused" class="form-control">
            {% for v in dropdowns.deviceused %}
            <option>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Merchant Type</label>
          <select name="merchanttype" class="form-control">
            {% for v in dropdowns.merchanttype %}
            <option>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Time of Day</label>
          <select name="timeofday" class="form-control">
            {% for v in dropdowns.timeofday %}
            <option>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Save Expense</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary"
          >← Back to Dashboard</a
        >
      </div>
    </form>
  </div>
</div>
{% endblock %}
