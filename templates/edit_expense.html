{% extends "base.html" %} {% block content %}
<div class="form-page">
  <div class="form-card glass">
    <h2>✏️ Edit Expense</h2>
    <form method="POST" action="{{ url_for('edit_expense', expense_id=expense.id) }}">
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" name="date" class="form-control" value="{{ expense.date }}" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" name="description" class="form-control" value="{{ expense.description or '' }}" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Amount (₹)</label>
          <input type="number" name="amount" class="form-control" value="{{ expense.amount }}" step="0.01" />
        </div>
        <div class="form-group">
          <label>Category</label>
          <select name="category" class="form-control">
            {% for v in dropdowns.category %}
            <option {% if v==expense.category %}selected{% endif %}>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Payment Method</label>
          <select name="paymentmethod" class="form-control">
            {% for v in dropdowns.paymentmethod %}
            <option {% if v==expense.paymentmethod %}selected{% endif %}>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <select name="location" class="form-control">
            {% for v in dropdowns.location %}
            <option {% if v==expense.location %}selected{% endif %}>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Account Type</label>
          <select name="accounttype" class="form-control">
            {% for v in dropdowns.accounttype %}
            <option {% if v==expense.accounttype %}selected{% endif %}>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Device Used</label>
          <select name="deviceused" class="form-control">
            {% for v in dropdowns.deviceused %}
            <option {% if v==expense.deviceused %}selected{% endif %}>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-row">

        <div class="form-group">
          <label>Merchant Type</label>
          <select name="merchanttype" class="form-control">
            {% for v in dropdowns.merchanttype %}
            <option {% if v==expense.merchanttype %}selected{% endif %}>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Time of Day</label>
          <select name="timeofday" class="form-control">
            {% for v in dropdowns.timeofday %}
            <option {% if v==expense.timeofday %}selected{% endif %}>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
      </div>



      <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Update Expense</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">← Back to Dashboard</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
